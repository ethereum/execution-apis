Log:
  title: log
  type: object
  required:
    - transactionHash
  additionalProperties: false
  properties:
    removed:
      title: removed
      type: boolean
    logIndex:
      title: log index
      $ref: '#/components/schemas/uint'
    transactionIndex:
      title: transaction index
      $ref: '#/components/schemas/uint'
    transactionHash:
      title: transaction hash
      $ref: '#/components/schemas/hash32'
    blockHash:
      title: block hash
      $ref: '#/components/schemas/hash32'
    blockNumber:
      title: block number
      $ref: '#/components/schemas/uint'
    blockTimestamp:
      title: block timestamp
      $ref: '#/components/schemas/uint'
    address:
      title: address
      $ref: '#/components/schemas/address'
    data:
      title: data
      $ref: '#/components/schemas/bytes'
    topics:
      title: topics
      type: array
      items:
        $ref: '#/components/schemas/bytes32'
ReceiptInfo:
  type: object
  title: Receipt information
  required:
    - blockHash
    - blockNumber
    - from
    - cumulativeGasUsed
    - gasUsed
    - logs
    - logsBloom
    - transactionHash
    - transactionIndex
    - effectiveGasPrice
  additionalProperties: false
  properties:
    type:
      title: type
      $ref: '#/components/schemas/byte'
    transactionHash:
      title: transaction hash
      $ref: '#/components/schemas/hash32'
    transactionIndex:
      title: transaction index
      $ref: '#/components/schemas/uint'
    blockHash:
      title: block hash
      $ref: '#/components/schemas/hash32'
    blockNumber:
      title: block number
      $ref: '#/components/schemas/uint'
    from:
      title: from
      $ref: '#/components/schemas/address'
    to:
      title: to
      description: Address of the receiver or null in a contract creation transaction.
      oneOf:
        - title: Contract Creation (null)
          type: 'null'
        - title: Recipient Address
          $ref: '#/components/schemas/address'
    cumulativeGasUsed:
      title: cumulative gas used
      description: The sum of gas used by this transaction and all preceding transactions in the same block.
      $ref: '#/components/schemas/uint'
    gasUsed:
      title: gas used
      description: The amount of gas used for this specific transaction alone.
      $ref: '#/components/schemas/uint'
    blobGasUsed:
      title: blob gas used
      description: The amount of blob gas used for this specific transaction. Only specified for blob transactions as defined by EIP-4844.
      $ref: '#/components/schemas/uint'
    contractAddress:
      title: contract address
      description: The contract address created, if the transaction was a contract creation, otherwise null.
      oneOf:
        - $ref: '#/components/schemas/address'
        - title: 'Null'
          type: 'null'
    logs:
      title: logs
      type: array
      items:
        $ref: '#/components/schemas/Log'
    logsBloom:
      title: logs bloom
      $ref: '#/components/schemas/bytes256'
    root:
      title: state root
      description: The post-transaction state root. Only specified for transactions included before the Byzantium upgrade.
      $ref: '#/components/schemas/hash32'
    status:
      title: status
      description: Either 1 (success) or 0 (failure). Only specified for transactions included after the Byzantium upgrade.
      $ref: '#/components/schemas/uint'
    effectiveGasPrice:
      title: effective gas price
      description: The actual value per gas deducted from the sender's account. Before EIP-1559, this is equal to the transaction's gas price. After, it is equal to baseFeePerGas + min(maxFeePerGas - baseFeePerGas, maxPriorityFeePerGas).
      $ref: '#/components/schemas/uint'
    blobGasPrice:
      title: blob gas price
      description: The actual value per gas deducted from the sender's account for blob gas. Only specified for blob transactions as defined by EIP-4844.
      $ref: '#/components/schemas/uint'
    stateGasCharged:
      title: state gas charged
      description: |
        Total state-dimension gas charged to this transaction before refunds, in gas units.

        Equals the sum of:
        1. Intrinsic state-gas at transaction entry — `AccountCreationCost` for tx-level
           CREATE; `STATE_BYTES_PER_AUTH_BASE × CPSB` per EIP-7702 authorization in the
           auth list.
        2. End-of-frame state-gas charges from successful CALL, CREATE, CREATE2, and
           SSTORE operations. Reverted or exceptionally-halted frames contribute nothing.

        Always ≥ 0. Does NOT include refunds (see `stateGasRefunded`). The net state gas
        attributable to this transaction is `stateGasCharged − stateGasRefunded` and
        MAY be negative under EIP-7702 unset.

        Present only for transactions in blocks under a fork that activates EIP-8037
        (Amsterdam onward). Omitted otherwise.

        Source: EIP-8037 attribute `tx_state_gas_charged` (per ethereum/EIPs#11573).
      $ref: '#/components/schemas/uint'
    stateGasRefunded:
      title: state gas refunded
      description: |
        Total state-dimension gas refunded to this transaction, in gas units.

        Refund kinds:
        1. SELFDESTRUCT same-transaction-create-and-destroy refund per EIP-6780
           (bypasses the EIP-3529 20% refund cap).
        2. EIP-7702 unset-delegation refund — `STATE_BYTES_PER_AUTH_BASE × CPSB` per
           cleared authorization. The underlying charge may have been paid in an
           earlier transaction; the refund is credited to this transaction.
        3. Tx-level CREATE-halt refund of `intrinsic_state_gas` when a contract-
           creation transaction exceptionally halts or reverts
           (per ethereum/EIPs#11611).

        Always ≥ 0. MAY exceed `stateGasCharged` for the same transaction (e.g.,
        EIP-7702 unset of a delegation paid for earlier). At the block boundary,
        `Σ stateGasCharged ≥ Σ stateGasRefunded` is guaranteed by the block builder.

        Header reconstruction:
          `header.stateGasUsed = Σ(receipts.stateGasCharged) − Σ(receipts.stateGasRefunded)`
          `header.regularGasUsed = Σ(receipts.gasUsed) − header.stateGasUsed`

        Present only for transactions in blocks under a fork that activates EIP-8037
        (Amsterdam onward). Omitted otherwise.

        Source: EIP-8037 attribute `tx_state_gas_refunded` (per ethereum/EIPs#11573).
      $ref: '#/components/schemas/uint'
