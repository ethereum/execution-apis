name: Publish stamped spec branch (recovery)
# Manual recovery `workflow_dispatch` only (not `release: published`).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to re-publish assembled-spec from, e.g. v1.2.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download stamped spec from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag }}
        run: |
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern openrpc.json \
            --pattern refs-openrpc.json \
            --clobber
      - name: setup git config
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "<>"
      - name: Deploy assembled spec (stamped release)
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: |
          git checkout -b assembled-spec
          git add -f openrpc.json
          git add -f refs-openrpc.json
          git commit -m "release ${TAG}"
          git push -fu origin assembled-spec
