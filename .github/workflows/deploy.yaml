name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: ^1.26
        id: go

      - name: Build the spec
        run: make build

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Assemble versioned docs from releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/assemble-versions.js

      - name: Build docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Upload openrpc spec
        uses: actions/upload-artifact@v4
        with:
          name: openrpc-spec
          path: |
            openrpc.json
            refs-openrpc.json

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-spec-main:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download openrpc spec
        uses: actions/download-artifact@v4
        with:
          name: openrpc-spec
      - name: setup git config
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "<>"
      - name: Deploy assembled spec (main, unstamped)
        run: |
          git checkout -b assembled-spec-main
          git add -f openrpc.json
          git add -f refs-openrpc.json
          git commit -m "assemble openrpc.json from main@${GITHUB_SHA::7}"
          git push -fu origin assembled-spec-main
