BlobAndProofV1:
  title: Blob and proof object V1
  type: object
  required:
    - blob
    - proof
  properties:
    blob:
      title: Blob
      $ref: "#/components/schemas/bytes"
    proof:
      title: proof
      $ref: "#/components/schemas/bytes48"

BlobAndProofV2:
  title: Blob and proof object V2
  type: object
  required:
    - blob
    - proofs
  properties:
    blob:
      title: Blob
      $ref: "#/components/schemas/bytes"
    proofs:
      title: Cell Proofs
      type: array
      items:
        $ref: "#/components/schemas/bytes48"

BlobCellsAndProofsV1:
  title: Blob cells and proofs object V1
  type: object
  required:
    - blob_cells
    - proofs
  properties:
    blob_cells:
      title: Blob Cells
      type: array
      items:
        oneOf:
          - $ref: "#/components/schemas/bytes"
          - type: "null"
    proofs:
      title: Cell Proofs
      type: array
      items:
        oneOf:
          - $ref: "#/components/schemas/bytes48"
          - type: "null"
