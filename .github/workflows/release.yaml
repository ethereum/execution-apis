name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)release, e.g. v1.2.0"
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version: ^1.26
        id: go

      - name: Build the spec
        run: make build

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Stamp spec version from tag
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: npm run spec:set-version -- --version "$TAG"

      - name: Build docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:docs

      - name: Snapshot versioned docs
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          VER="${TAG#v}"
          npx docusaurus docs:version:api "$VER"
          tar -czf "docs-snapshot-${TAG}.tar.gz" \
            "api_versioned_docs/version-${VER}" \
            "api_versioned_sidebars/version-${VER}-sidebars.json"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Upload openrpc spec
        uses: actions/upload-artifact@v4
        with:
          name: openrpc-spec
          path: |
            openrpc.json
            refs-openrpc.json

      - name: Upload docs snapshot
        uses: actions/upload-artifact@v4
        with:
          name: docs-snapshot
          path: docs-snapshot-*.tar.gz

  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  github-release:
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: openrpc-spec

      - uses: actions/download-artifact@v4
        with:
          name: docs-snapshot

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --draft \
            --generate-notes \
            openrpc.json refs-openrpc.json "docs-snapshot-${TAG}.tar.gz"
