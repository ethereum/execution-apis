- name: debug_executionWitness
  summary: Returns the execution witness of a block.
  description: |
    Re-executes the block and returns the canonical execution witness: the
    state trie-node preimages, contract-code preimages, and RLP-encoded
    ancestor headers required to statelessly validate the block. Clients may
    additionally include the accessed state keys.
  params:
    - name: Block
      required: true
      schema:
        $ref: '#/components/schemas/BlockNumberOrTagOrHash'
  errors:
    - code: 4444
      message: Pruned history unavailable
  result:
    name: Execution witness
    schema:
      $ref: '#/components/schemas/ExecutionWitness'
  examples:
    - name: debug_executionWitness example
      params:
        - name: Block
          value: '0x36'
      result:
        name: Execution witness
        value:
          state:
            - '0xe2a0200decd9548b62a8d60345a988386fc84ba6bc95484008f6362f93160ef3e56336'
            - '0xe5a020ef7921622df1b8289e03d939bbc589c8517951e47ceb77017146e94c3b62fb83820212'
          codes:
            - '0x3373fffffffffffffffffffffffffffffffffffffffe14604657602036036042575f35600143038111604257611fff81430311604257611fff9006545f5260205ff35b5f5ffd5b5f35611fff60014303065500'
          headers:
            - ''
